<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo">
                    <img src="assets/github-logo.png" alt="GitHub Logo" class="logo-image">
                </div>
                <h1 class="title">GitHub Issues Tracker</h1>
                <p class="subtitle">Manage and track your project issues efficiently</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Enter your username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <button type="submit" class="login-btn">Sign In</button>

                <div class="demo-credentials">
                    <p class="demo-title">Demo Credentials:</p>
                    <div class="credentials-info">
                        <span><strong>Username:</strong> admin</span>
                        <span><strong>Password:</strong> admin123</span>
                    </div>
                </div>
            </form>

            <div id="errorMessage" class="error-message"></div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
