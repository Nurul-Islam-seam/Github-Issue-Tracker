<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <div class="nav-logo">
                    <img src="assets/Aperture.png" alt="App Logo" class="nav-logo-image">
                    <span>GitHub Issues</span>
                </div>
            </div>

            <div class="nav-right">
                <div class="search-container">
                    <input 
                        type="text" 
                        id="searchInput" 
                        class="search-input" 
                        placeholder="Search issues..."
                    >
                    <button id="searchBtn" class="search-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </button>
                </div>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-container">
        <!-- Tabs Section -->
        <div class="tabs-section">
            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="all">
                    <span class="tab-icon">📋</span>
                    All Issues
                </button>
                <button class="tab-btn" data-tab="open">
                    <span class="tab-icon">🔓</span>
                    Open
                </button>
                <button class="tab-btn" data-tab="closed">
                    <span class="tab-icon">✅</span>
                    Closed
                </button>
            </div>

            <div class="tab-info">
                <div class="tab-info-left">
                    <span class="tab-icon">📊</span>
                    <span id="issueCount" class="issue-count">0</span>
                    <span class="info-text" id="infoText">issues</span>
                </div>
                <div class="tab-info-right">
                    <span class="status-badge open">Open</span>
                    <span class="status-badge closed">Closed</span>
                </div>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="loading-spinner hidden">
            <div class="spinner"></div>
            <p>Loading issues...</p>
        </div>

        <!-- Issues Grid -->
        <div id="issuesGrid" class="issues-grid"></div>

        <!-- No Results -->
        <div id="noResults" class="no-results hidden">
            <p>No issues found</p>
        </div>
    </div>

    <!-- Issue Detail Modal -->
    <div id="issueModal" class="modal hidden">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
